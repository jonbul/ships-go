services:

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - /home/jonbul/servers/monitoring/prometheus_data:/prometheus  # sudo chown -R 65534:65534 /home/jonbul/servers/prometheus/data
      - /home/jonbul/servers/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    restart: unless-stopped
    networks:
      - ships-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "6006:3000"  # host 3030 para no colisionar con ships-go en el 3000
    volumes:
      - /home/jonbul/servers/monitoring/grafana_data:/var/lib/grafana  # sudo chown -R 472:472 /home/jonbul/servers/grafana/data
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=changeme
      - GF_SERVER_ROOT_URL=http://localhost:6006
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - ships-network

networks:
  ships-network:
    external: true  # creada por runShipsGoV2.sh